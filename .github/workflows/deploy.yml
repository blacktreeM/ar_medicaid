name: Generate Plot and Deploy website

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Speeds up installation by pulling pre-compiled Linux binaries

      # Automatically detects and installs required Linux system tools + R packages
      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::ggplot2
            any::readxl
            any::dplyr
            any::fixest
            any::patchwork
            any::stargazer

      - name: Run R Script to generate plot
        run: Rscript generate_plot.R

      - name: Commit and Push Plot
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add plot_event_share.png || echo "Plot file name might differ"
          git commit -m "Update generated plot" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
