name: Generate Plot and Deploy website

on:
  push:
    branches: [ "main" ] # Runs every time you update your code
  workflow_dispatch: # Allows you to run it manually

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Run R Script to generate plot
        run: Rscript generate_plot.R

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Deploys the current folder containing index.html and my_plot.png
          branch: gh-pages # Puts the website assets on a special branch
