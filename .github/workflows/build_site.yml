name: Build Analysis Website

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R Packages
        run: |
          Rscript -e 'install.packages(c("dplyr", "ggplot2", "knitr", "rmarkdown", "readxl", "tidyr"))'

      - name: Build Web Page
        run: |
          Rscript -e "rmarkdown::render('analysis.Rmd', output_file = 'index.html')"

      - name: Commit and Push Website File
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-compile analysis website" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
